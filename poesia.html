<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisol Retano | Poesía</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Marisol Retano</a></div>
    <nav>
        <a href="2026.html">2026</a>
        <a href="index.html">2025</a>
        <a href="2024.html">2024</a>
        <a href="poesia.html" class="active">Poesia +</a>
        <a href="cv.html">CV</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<main>
    <div class="poetry-grid" id="contenedor-poesia">
    </div>
</main>

<footer>
    <div class="signature-container">
        <img src="imagenes/firma.jpg" alt="Firma Retano" class="signature-icon">
    </div>
</footer>

<script>

    /*🟢 POEMAS 🟢*/

    const poemas = [
        {
            titulo: "Para escuchar tu voz",
            anio: "2025",
            // Usamos las comillas invertidas (`) para poder dar "Enter" libremente en el texto
            contenido: `
                <p>
                    Ojalá me entendieras, para que supieras lo<br>
                    mucho que me importa.<br>
                    Para que supieras que te busco en vano.<br>
                    Para que supieras lo que es mirarte a los ojos,<br>
                    para degollar el tiempo y gritar tu nombre en un espejo oscuro.
                </p>
                <br>
                <p>
                    Para escuchar tu voz oculta en la distancia.<br>
                    Para declarar la ausencia a tu nombre.<br>
                    Para cantarte lo que nunca te dije.<br>
                    Para quemar la calle de ambos lados.<br>
                    Para que llorases conmigo.<br>
                    Para que contemplaras tu rostro.<br>
                    Para recordar el silencio de tu risa.<br>
                    Para que me sientas y me abraces.<br>
                    Para que me escuches y me pienses.<br>
                    Para que me mires y detengas tu partida.<br>
                    Para que supieras lo mucho que me importa.
                </p>
                <br>
                <p>
                    Para que entendieras tu nombre y mi nombre.<br>
                    Para que entendieras y supieras.<br>
                    Para que me veas y te veas.
                </p>
            `
        },
        {
            titulo: "Patria",
            anio: "2022",
            contenido: `
                <p>
                    Amor,<br>
                    este corazón,<br>
                    salvajemente herido,<br>
                    por patria ha bebido<br>
                    en la noche oscura<br>
                    de tu incendiaria boca.
                </p>
            `
        },
        {
            titulo: "Teoría",
            anio: "2023",
            contenido: `
                <p>
                    El amor<br>
                    es la piedad que nos tenemos.
                </p>
            `
        }
    ];

    /*🛑 MOTOR 🛑*/

    const contenedor = document.getElementById('contenedor-poesia');

    poemas.forEach(poema => {
        const tarjetaPoema = document.createElement('article');
        tarjetaPoema.className = "poem-card";

        tarjetaPoema.innerHTML = `
            <div class="poem-header">
                <h2 class="poem-title">${poema.titulo}</h2>
                <div class="poem-meta">${poema.anio}</div>
            </div>
            <div class="poem-content">
                ${poema.contenido}
            </div>
        `;

        contenedor.appendChild(tarjetaPoema);
    });

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => { if (e.target.nodeName === 'IMG') e.preventDefault(); });
</script>

</body>
</html>
