<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisol Retano | 2025</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Marisol Retano</a></div>
    <nav>
        <a href="2026.html">2026</a>
        <a href="index.html" class="active">2025</a>
        <a href="2024.html">2024</a>
        <a href="poesia.html">Poesia +</a>
        <a href="cv.html">CV</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<main>
    <section class="gallery" id="contenedor-galeria">
    </section>
</main>

<footer>
    <div class="signature-container">
        <img src="imagenes/firma.jpg" alt="Firma Retano" class="signature-icon">
    </div>
</footer>

<script>

    /* =================
       🟢OBRAS (2025)🟢
       =================*/

    const obras2025 = [
        {
            archivo: "obra25-1.jpg",
            tituloBase: "Exploraciones del azul No.1 Cobalto",
            fichaTecnica: "Exploraciones del azul<br>No.1 Cobalto<br>Óleo<br>15.5 x 22.7 cm<br>2025",
            tamano: ""
        },
        {
            archivo: "obra25-2.jpg",
            tituloBase: "Atardecer No.8",
            fichaTecnica: "Atardecer No.8<br>Óleo<br>16 x 22.4 cm<br>2025",
            tamano: ""
        },
        {
            archivo: "obra25-3.jpg",
            tituloBase: "Ecos, no.1",
            fichaTecnica: "Ecos, no.1<br>Óleo<br>14 x 22.3 cm<br>2025",
            tamano: ""
        },
        {
            archivo: "obra25-4.jpg",
            tituloBase: "Exploraciones del azul No.3 Ultramar",
            fichaTecnica: "Exploraciones del azul<br>No.3 Ultramar<br>Óleo<br>16 x 22.2 cm<br>2025",
            tamano: ""
        },
        {
            archivo: "obra25-5.jpg",
            tituloBase: "Exploraciones del azul No.2 Prusia",
            fichaTecnica: "Exploraciones del azul<br>No.2 Prusia<br>Óleo<br>15 x 23.3 cm<br>2025",
            tamano: ""
        },
        {
            archivo: "obra25-6.jpg",
            tituloBase: "Rencuentros: Ecos y tus ojos / Oscuros No.4",
            fichaTecnica: "Rencuentros:<br>Ecos y tus ojos / Oscuros No.4<br>Óleo<br>16.5 x 22.8 cm<br>2025",
            tamano: ""
        },
        {
            archivo: "obra25-7.jpg",
            tituloBase: "Rencuentros: Ecos y tus ojos / Oscuros no.2",
            fichaTecnica: "Rencuentros:<br>Ecos y tus ojos / Oscuros no.2<br>Óleo<br>14.8 x 21 cm<br>2025",
            tamano: ""
        },
        {
            archivo: "obra25-8.jpg",
            tituloBase: "Llanura no.1",
            fichaTecnica: "Llanura no.1<br>Óleo<br>17 x 25 cm<br>2025",
            tamano: ""
        }
    ];

    /*🛑 EL MOTOR 🛑*/

    const contenedor = document.getElementById('contenedor-galeria');

    obras2025.forEach(obra => {
        const cajaObra = document.createElement('div');

        if (obra.tamano !== "") {
            cajaObra.className = `item ${obra.tamano}`;
        } else {
            cajaObra.className = "item";
        }

        cajaObra.innerHTML = `
            <img src="imagenes/${obra.archivo}" alt="${obra.tituloBase}">
            <div class="overlay">
                <span>${obra.fichaTecnica}</span>
            </div>
        `;

        cajaObra.addEventListener('click', function() {
            if (this.classList.contains('active')) {
                this.classList.remove('active');
            } else {
                document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            }
        });

        contenedor.appendChild(cajaObra);
    });

    /*🛑 SEGURIDAD 🛑*/

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => { if (e.target.nodeName === 'IMG') e.preventDefault(); });
</script>

</body>
</html>
