<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisol Retano | Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

<header>
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Marisol Retano</a></div>
    <nav>
        <a href="2026.html">2026</a>
        <a href="index.html">2025</a>
        <a href="2024.html">2024</a>
        <a href="poesia.html">Poesia +</a>
        <a href="cv.html">CV</a>
        <a href="contacto.html" class="active">Contacto</a>
    </nav>
</header>

<main class="contact-main">
    <div class="contact-wrapper" id="contenedor-contacto">
    </div>
</main>

<footer>
    <div class="signature-container">
        <img src="imagenes/firma.jpg" alt="Firma Retano" class="signature-icon">
    </div>
</footer>

<script>

    /*🟢 CONTACTO 🟢*/

    const datosContacto = {
        mensajeIntro: "Para consultas, adquisiciones o colaboraciones:",
        correos: [
            "marisolmrz@icloud.com",
        ],
        redSocial: {
            nombre: "Instagram",
            enlace: "https://www.instagram.com/agrimpoem/",
            icono: "imagenes/instagram.png"
        }
    };

    /*🛑 EL MOTOR 🛑*/

    const contenedor = document.getElementById('contenedor-contacto');

    // Construimos la lista de correos
    let htmlCorreos = "";
    datosContacto.correos.forEach(correo => {
        htmlCorreos += `<p class="contact-email-text">${correo}</p>`;
    });

    // Inyectamos todo al HTML
    contenedor.innerHTML = `
        <div class="email-section">
            <p class="intro-text">${datosContacto.mensajeIntro}</p>
            ${htmlCorreos}
        </div>

        <div class="social-section">
            <a href="${datosContacto.redSocial.enlace}" target="_blank" class="instagram-link">
                <img src="${datosContacto.redSocial.icono}" alt="${datosContacto.redSocial.nombre} Retano" class="social-icon">
            </a>
            <p class="social-label">${datosContacto.redSocial.nombre}</p>
        </div>
    `;

    /*🛑 SEGURIDAD 🛑*/

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => { if (e.target.nodeName === 'IMG') e.preventDefault(); });
</script>

</body>
</html>
