<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisol Retano | 2024</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Marisol Retano</a></div>
    <nav>
        <a href="2026.html">2026</a>
        <a href="index.html">2025</a>
        <a href="2024.html" class="active">2024</a>
        <a href="poesia.html">Poesia +</a>
        <a href="cv.html">CV</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<main>
    <section class="gallery" id="contenedor-galeria">
    </section>
</main>

<footer>
    <div class="signature-container">
        <img src="imagenes/firma.jpg" alt="Firma Retano" class="signature-icon">
    </div>
</footer>

<script>

    /* =================
       🟢OBRAS (2024)🟢
       =================*/

    const obras2024 = [
        {
            archivo: "obra24-1.jpg",
            tituloBase: "Margarita o Antónimo de amarillo",
            fichaTecnica: "No.5<br>Margarita o Antónimo de amarillo<br>Óleo<br>12.5 x 21.2 cm<br>2024",
            tamano: "item-large" // Hace que la imagen ocupe 2 columnas
        },
        {
            archivo: "obra24-2.jpg",
            tituloBase: "Sin título",
            fichaTecnica: "Sin título<br>Óleo sobre cartón con tela<br>12 x 15 cm<br>2024",
            tamano: "item-small" // Reduce el tamaño visualmente
        },
        {
            archivo: "obra24-3.jpg",
            tituloBase: "Exploración de Cadnio",
            fichaTecnica: "Exploración de Cadnio<br>Óleo sobre cartón con tela<br>12 x 15 cm<br>2024",
            tamano: "" // Dejar vacío para tamaño normal
        },
        {
            archivo: "obra24-4.jpg",
            tituloBase: "Exploración de ocre",
            fichaTecnica: "Exploración de ocre<br>Óleo sobre cartón con tela<br>12 x 15 cm<br>2024",
            tamano: ""
        },
        {
            archivo: "obra24-5.jpg",
            tituloBase: "Sin título",
            fichaTecnica: "Sin título<br>Óleo sobre cartón con tela<br>12 x 15 cm<br>2024",
            tamano: ""
        },
        {
            archivo: "obra24-6.jpg",
            tituloBase: "Sin título",
            fichaTecnica: "Sin título<br>Óleo sobre cartón con tela<br>12 x 15 cm<br>2024",
            tamano: ""
        },
        {
            archivo: "obra24-7.jpg",
            tituloBase: "Exploración botana n.1",
            fichaTecnica: "Exploración botana n.1<br>Óleo<br>22 x 27 cm<br>2024",
            tamano: ""
        }
    ];

    /*🛑 MOTOR 🛑*/

    const contenedor = document.getElementById('contenedor-galeria');

    obras2024.forEach(obra => {
        // 1. Crear la caja de la obra
        const cajaObra = document.createElement('div');

        // 2. Asignar clases de CSS (item + el tamaño específico si lo tiene)
        if (obra.tamano !== "") {
            cajaObra.className = `item ${obra.tamano}`;
        } else {
            cajaObra.className = "item";
        }

        // 3. Insertar la imagen y los textos
        cajaObra.innerHTML = `
            <img src="imagenes/${obra.archivo}" alt="${obra.tituloBase}">
            <div class="overlay">
                <span>${obra.fichaTecnica}</span>
            </div>
        `;

        // 4. Lógica para celulares (toque)
        cajaObra.addEventListener('click', function() {
            if (this.classList.contains('active')) {
                this.classList.remove('active');
            } else {
                // Cerramos las demás antes de abrir esta
                document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            }
        });

        // 5. Agregar la obra terminada al HTML
        contenedor.appendChild(cajaObra);
    });

    /*🛑 SEGURIDAD 🛑*/

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => { if (e.target.nodeName === 'IMG') e.preventDefault(); });

</script>

</body>
</html>
