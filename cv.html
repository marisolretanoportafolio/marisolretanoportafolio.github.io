<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisol Retano | CV</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 1. Encabezado principal compacto */
        .cv-header h1 {
            margin-bottom: 0px;
            padding-bottom: 0px;
        }
        .cv-subtitle {
            margin-top: 0px;
            line-height: 1.2;
        }

        /* 2. Items del CV: Información interna pegada */
        .cv-content {
            line-height: 1.1;
        }
        .cv-content strong {
            display: block;
            margin-bottom: 2px; /* Espacio mínimo bajo el título del evento */
        }

        /* 3. ESPACIO ENTRE AÑOS: Aquí es donde separamos cada bloque */
        .cv-row {
            margin-bottom: 28px; /* Aumentamos este valor para separar los años */
            display: flex;
        }
    </style>
</head>
<body class="cv-page">

<header>
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Marisol Retano</a></div>
    <nav>
        <a href="2026.html">2026</a>
        <a href="index.html">2025</a>
        <a href="2024.html">2024</a>
        <a href="poesia.html">Poesia +</a>
        <a href="cv.html" class="active">CV</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<main class="cv-container">

    <div class="cv-header">
        <h1>Marisol Retano Zazueta</h1>
        <div class="cv-subtitle">
            Hermosillo, Sonora, México<br>
            Nacida el 11 de octubre de 2001
        </div>
    </div>

    <hr class="cv-divider">

    <div id="contenedor-cv">
    </div>

</main>

<footer>
    <div class="signature-container">
        <img src="imagenes/firma.jpg" alt="Firma Retano" class="signature-icon">
    </div>
</footer>

<script>

    /* 🟢 CV 🟢 */

    const datosCV = [
        {
            categoria: "Formación Académica",
            items: [
                { anio: "2016–2018", descripcion: "<strong>Bachillerato en Educación Artística</strong>CEDART “José Eduardo Pierson”. Especialidad: Danza." },
                { anio: "En curso", descripcion: "<strong>Licenciatura en Artes Plásticas</strong>Universidad de Sonora (Noveno semestre). Especialidad: Pintura." }
            ]
        },
        {
            categoria: "Cursos y Diplomados",
            items: [
                { anio: "2024", descripcion: "<strong>Curso-Taller de Curaduría: hambre</strong>Impartido por el M.A.V Gracia Doré Luévano Rodríguez, Hermosillo, Sonora." },
                { anio: "2025", descripcion: "<strong>Taller Campo de Juego LUAN</strong>Hermosillo, Sonora." },
                { anio: "2025", descripcion: "<strong>Curso Gestión de Proyectos Culturales</strong>Escuela Complutense de Madrid, España (Julio)." }
            ]
        },
        {
            categoria: "Participación como Artista Plástica",
            items: [
                { anio: "2019", descripcion: "<strong>Locura, Somos Náufragos</strong>Casa de la Cultura de Puerto Peñasco, Sonora." },
                { anio: "2019", descripcion: "<strong>Exposición colectiva</strong>Galería de Artesanos, Hermosillo, Sonora." },
                { anio: "2025", descripcion: "<strong>Bolita por favor</strong>Exposición colectiva, El Mentidero, Hermosillo, Sonora." },
                { anio: "2025", descripcion: "<strong>Resonancia de lo Interno</strong>Exposición colectiva, MUSAS, Hermosillo, Sonora." }
            ]
        },
        {
            categoria: "Investigación y Análisis Artístico",
            items: [
                { anio: "2025", descripcion: "<strong>Participación con análisis iconográficos</strong>Para la exposición 'Una llama silenciosa' del artista Benjamín Coria, presentada en el Museo de Arte de Sonora (MUSAS)." }
            ]
        },
        {
            categoria: "Participaciones Literarias",
            items: [
                { anio: "2018", descripcion: "<strong>Festival del Pitic</strong>Presentación de poesía." },
                { anio: "2019", descripcion: "<strong>Festival del Pitic</strong>Presentación de poesía." },
                { anio: "2019", descripcion: "<strong>Feria del Libro de Hermosillo</strong>Presentación de poesía." },
                { anio: "2020", descripcion: "<strong>Jornadas Binacionales de Literatura Abigael Bohórquez</strong>" }
            ]
        },
        {
            categoria: "Publicaciones",
            items: [
                { anio: "2019", descripcion: "<strong>Slamtología de Jóvenes Poetas Sonorenses</strong>Antología poética." },
                { anio: "2020", descripcion: "<strong>Me sangran los dedos</strong>Plaquette." }
            ]
        },
        {
            categoria: "Idiomas",
            items: [
                { anio: "", descripcion: "Español (Nativo)<br>Inglés" }
            ]
        }
    ];

    /* 🛑 MOTOR 🛑*/

    const contenedor = document.getElementById('contenedor-cv');
    datosCV.forEach(seccion => {
        const bloqueSeccion = document.createElement('section');
        bloqueSeccion.className = "cv-section";
        let htmlInterno = `<h3 class="cv-category">${seccion.categoria}</h3>`;
        seccion.items.forEach(item => {
            htmlInterno += `
                <div class="cv-row">
                    <div class="cv-year">${item.anio}</div>
                    <div class="cv-content">${item.descripcion}</div>
                </div>`;
        });
        bloqueSeccion.innerHTML = htmlInterno;
        contenedor.appendChild(bloqueSeccion);
    });

    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
