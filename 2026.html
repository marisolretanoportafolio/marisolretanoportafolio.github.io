<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisol Retano | 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Marisol Retano</a></div>
    <nav>
        <a href="2026.html" class="active">2026</a>
        <a href="index.html">2025</a>
        <a href="2024.html">2024</a>
        <a href="poesia.html">Poesia +</a>
        <a href="cv.html">CV</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<main>
    <section class="gallery" id="contenedor-galeria">
    </section>
</main>

<footer>
    <div class="signature-container">
        <img src="imagenes/firma.jpg" alt="Firma Retano" class="signature-icon">
    </div>
</footer>

<script>

    /* =================
       🟢OBRAS (2026)🟢
       =================*/

    const obras2026 = [
        {
            archivo: "obra26-2.jpg",
            tituloBase: "Recuerdos de una tarde en silencio n.2",
            fichaTecnica: "Recuerdos de una tarde en silencio n.2<br>Óleo sobre imprimación en minagris<br>11 x 18.5 cm<br>2026",
            tamano: "item-small" // Reduce el tamaño visualmente
        },
        {
            archivo: "obra26-1.jpg",
            tituloBase: "Recuerdos de una tarde en silencio n.1",
            fichaTecnica: "Recuerdos de una tarde en silencio n.1<br>Óleo sobre imprimación en minagris<br>11 x 18.5 cm<br>2026",
            tamano: "item-small"
        },
        {
            archivo: "obra26-3.jpg",
            tituloBase: "09|01|26",
            fichaTecnica: "09|01|26<br>Óleo sobre cartón con tela<br>12 x 15 cm<br>2026",
            tamano: "item-small"
        }
    ];

    /*🛑 EL MOTOR 🛑*/

    const contenedor = document.getElementById('contenedor-galeria');

    obras2026.forEach(obra => {
        const cajaObra = document.createElement('div');

        if (obra.tamano !== "") {
            cajaObra.className = `item ${obra.tamano}`;
        } else {
            cajaObra.className = "item";
        }

        cajaObra.innerHTML = `
            <img src="imagenes/${obra.archivo}" alt="${obra.tituloBase}">
            <div class="overlay">
                <span>${obra.fichaTecnica}</span>
            </div>
        `;

        cajaObra.addEventListener('click', function() {
            if (this.classList.contains('active')) {
                this.classList.remove('active');
            } else {
                document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            }
        });

        contenedor.appendChild(cajaObra);
    });

    /*🛑 SEGURIDAD 🛑*/

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => { if (e.target.nodeName === 'IMG') e.preventDefault(); });
</script>

</body>
</html>
